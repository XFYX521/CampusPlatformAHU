<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>鸿蒙智享泥安 - 站点导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#2c3e50;padding:30px 20px}
.wrap{max-width:1000px;margin:0 auto}
h1{text-align:center;font-weight:300;font-size:28px;color:#2c3e50;margin-bottom:4px;letter-spacing:2px}
.sub{text-align:center;color:#95a5a6;font-size:14px;margin-bottom:30px}
.nav{text-align:center;margin-bottom:30px}
.nav a{display:inline-block;padding:8px 22px;border-radius:8px;text-decoration:none;font-size:14px;margin:0 5px}
.nav a.on{background:#3498db;color:#fff}
.nav a.off{background:#fff;color:#7f8c8d;border:1px solid #e0e0e0}
.st{font-size:16px;font-weight:600;color:#2c3e50;margin:24px 0 14px;padding-left:12px;border-left:3px solid #3498db}
.cd{background:#fff;border-radius:10px;border:1px solid #e8e8e8;margin-bottom:10px;overflow:hidden}
.ch{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.ch:hover{background:#fafafa}
.ch .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ch .pt{font-family:monospace;font-size:13px;color:#2c3e50;font-weight:600}
.ch .ds{font-size:13px;color:#95a5a6;margin-left:auto}
.ch .ar{color:#bdc3c7;font-size:12px;margin-left:8px;transition:.2s}
.ch .aron{transform:rotate(180deg)}
.ch .acts{display:flex;gap:6px;flex-shrink:0}
.ch .btn-cpy{width:28px;height:28px;border-radius:6px;border:1px solid #e8e8e8;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#95a5a6;transition:.15s;padding:0}
.ch .btn-cpy:hover{border-color:#3498db;color:#3498db;background:#f0f8ff}
.cb{display:none;padding:0 20px 16px;border-top:1px solid #f0f0f0}
.cbon{display:block}
.sl{padding:8px 0 0}
.sl a{display:flex;align-items:center;padding:8px 16px;text-decoration:none;color:#2c3e50;font-size:13px;border-radius:6px;transition:.1s}
.sl a:hover{background:#f8f9fa}
.sl .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;min-width:36px;text-align:center;color:#fff;flex-shrink:0;margin-right:10px}
.tag-get{background:#2ecc71}
.tag-post{background:#3498db}
.tag-page{background:#95a5a6}
.sl .nm{font-size:13px}
.sl .dc{font-size:12px;color:#95a5a6;margin-left:12px}
.sl .arrow{color:#bdc3c7;margin-left:auto;font-size:11px}
.toast{visibility:hidden;min-width:160px;background:#2c3e50;color:#fff;text-align:center;border-radius:8px;padding:10px 18px;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:200;font-size:13px;transition:opacity .3s;opacity:0}
.toast.show{visibility:visible;opacity:1}
.ft{text-align:center;color:#bdc3c7;font-size:13px;padding:30px;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
<h1>真鸿蒙</h1>
<p class="sub">站点导航 · 快捷跳转</p>
<div class="nav" id="nv"></div>
<div id="main"></div>
<div class="ft">真鸿蒙 v2.0</div>
</div>
<div class="toast" id="toast"></div>

<script>
var tk = (new URLSearchParams(location.search).get('token')||localStorage.getItem('harmony_token'));
if(!tk)location.href='/admin/login';

function fullUrl(url){
  return location.protocol+'//'+location.host+url;
}
function copyUrl(url){
  var full = fullUrl(url);
  var ta = document.createElement('textarea');
  ta.value = full;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta);
  var t = document.getElementById('toast');
  t.textContent = '已复制: ' + url;
  t.className = 'toast show';
  setTimeout(function(){t.className='toast'},1500);
}
function tg(el){
  el.classList.toggle('cbon');
  el.previousElementSibling.querySelector('.ar').classList.toggle('aron');
}

document.getElementById('nv').innerHTML =
  '<a href="/admin?token='+tk+'" class="off">返回后台</a>' +
  '<a href="/nav?token='+tk+'" class="on">站点导航</a>';

var groups = [
  {
    icon:'🏠', bg:'#e8f4fd',
    url:'/admin', name:'用户管理', desc:'用户列表 · 编辑 · 删除',
    links:[
      {label:'page', name:'用户列表', desc:'查看、编辑、删除用户'}
    ]
  },
  {
    icon:'🧭', bg:'#e8f8f0',
    url:'/nav', name:'站点导航', desc:'全站页面索引',
    links:[
      {label:'page', name:'导航页面', desc:'快捷跳转所有页面'}
    ]
  },
  {
    icon:'📋', bg:'#fef5e7',
    url:'/api-docs', name:'接口文档', desc:'API 接口说明',
    links:[
      {label:'post', name:'管理员登录', desc:'POST /api/admin/login'},
      {label:'get', name:'用户列表', desc:'GET /api/admin/users'},
      {label:'get', name:'单个用户', desc:'GET /api/admin/users/:id'},
      {label:'put', name:'编辑用户', desc:'PUT /api/admin/users/:id'},
      {label:'delete', name:'删除用户', desc:'DELETE /api/admin/users/:id'},
      {label:'get', name:'健康检查', desc:'GET /api/health'}
    ]
  },
];

var h = '';
for(var g=0; g<groups.length; g++){
  var grp = groups[g];
  h += '<div class="cd">';
  h += '<div class="ch" onclick="tg(this.nextElementSibling)">';
  h += '<div class="icon" style="background:'+grp.bg+'">'+grp.icon+'</div>';
  h += '<span class="pt">'+grp.url+'</span>';
  h += '<span class="ds">'+grp.desc+'</span>';
  h += '<div class="acts">';
  h += '<button class="btn-cpy" onclick="event.stopPropagation();copyUrl(\''+grp.url+'\')" title="'+fullUrl(grp.url)+'">📋</button>';
  h += '</div>';
  h += '<span class="ar">▼</span>';
  h += '</div>';
  h += '<div class="cb">';
  h += '<div class="sl">';
  for(var i=0; i<grp.links.length; i++){
    var lk = grp.links[i];
    var tc = lk.label==='get'?'tag-get':lk.label==='post'?'tag-post':'tag-page';
    var tl = lk.label==='get'?'GET':lk.label==='post'?'POST':'页面';
    h += '<a href="'+grp.url+'">';
    h += '<span class="tag '+tc+'">'+tl+'</span>';
    h += '<span class="nm">'+lk.name+'</span>';
    h += '<span class="dc">'+lk.desc+'</span>';
    h += '<span class="arrow">→</span>';
    h += '</a>';
  }
  h += '</div></div></div>';
}
document.getElementById('main').innerHTML = h;
</script>
</body>
</html>
