<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>真鸿蒙 - 接口文档</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#2c3e50;padding:30px 20px}
.wrap{max-width:1000px;margin:0 auto}
h1{text-align:center;font-weight:300;font-size:28px;color:#2c3e50;margin-bottom:4px;letter-spacing:2px}
.sub{text-align:center;color:#95a5a6;font-size:14px;margin-bottom:30px}
.nav{text-align:center;margin-bottom:30px}
.nav a{display:inline-block;padding:8px 22px;border-radius:8px;text-decoration:none;font-size:14px;margin:0 5px}
.nav a.on{background:#3498db;color:#fff}
.nav a.off{background:#fff;color:#7f8c8d;border:1px solid #e0e0e0}
.st{font-size:16px;font-weight:600;color:#2c3e50;margin:24px 0 14px;padding-left:12px;border-left:3px solid #3498db}
.st .tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;color:#fff;margin-left:10px;vertical-align:middle}
.tag-hm{background:#3498db}
.tag-ml{background:#2ecc71}
.cd{background:#fff;border-radius:10px;border:1px solid #e8e8e8;margin-bottom:10px;overflow:hidden}
.ch{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.ch:hover{background:#fafafa}
.mt{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;min-width:48px;text-align:center}
.mtg{background:#2ecc71}.mtp{background:#3498db}.mtu{background:#f39c12}.mtd{background:#e74c3c}
.pt{font-family:monospace;font-size:13px;color:#2c3e50}
.ds{font-size:13px;color:#95a5a6;margin-left:auto}
.ar{color:#bdc3c7;font-size:12px;margin-left:8px;transition:.2s}
.aron{transform:rotate(180deg)}
.cb{display:none;padding:0 20px 20px;border-top:1px solid #f0f0f0}
.cbon{display:block}
.sec{margin-top:16px}
.lb{font-size:11px;color:#95a5a6;text-transform:uppercase;margin-bottom:6px}
.tb{background:#f8f9fa;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:12px;line-height:1.7;border:1px solid #e8e8e8;position:relative;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.cp{position:absolute;top:8px;right:8px;background:#e8e8e8;border:none;color:#7f8c8d;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.ft{text-align:center;color:#bdc3c7;font-size:13px;padding:30px;margin-top:30px}
.err-table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
.err-table th{text-align:left;padding:8px 12px;color:#95a5a6;font-weight:400;border-bottom:2px solid #f0f0f0;font-size:11px;text-transform:uppercase}
.err-table td{padding:8px 12px;border-bottom:1px solid #f8f8f8;color:#2c3e50}
.err-table td.c{color:#e74c3c;font-family:monospace;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<h1>真鸿蒙后端</h1>
<p class="sub">API 接口文档 · <span style="color:#3498db">● 鸿蒙应用</span> <span style="color:#2ecc71;margin-left:12px">● MATLAB</span></p>
<div class="nav" id="nv"></div>

<div class="st">📖 错误码说明</div>
<div class="cd" style="overflow:visible">
<div class="cb cbon" style="display:block;padding:16px 20px;border:none">
<table class="err-table">
<thead><tr><th>错误码</th><th>含义</th><th>说明</th></tr></thead>
<tbody>
<tr><td class="c">200</td><td>成功</td><td>请求正常处理</td></tr>
<tr><td class="c">400</td><td>请求参数错误</td><td>参数缺失、格式不正确、校验不通过</td></tr>
<tr><td class="c">401</td><td>未登录 / 登录已过期</td><td>token无效或未传入</td></tr>
<tr><td class="c">403</td><td>权限不足 / token无效</td><td>没有访问该资源的权限，或反馈/隐私token错误</td></tr>
<tr><td class="c">404</td><td>资源不存在</td><td>用户不存在、接口不存在等</td></tr>
<tr><td class="c">409</td><td>资源冲突</td><td>用户名已存在、邮箱已注册等</td></tr>
<tr><td class="c">429</td><td>请求频率过高</td><td>反馈接口每分钟最多2条</td></tr>
<tr><td class="c">500</td><td>服务器内部错误</td><td>后端异常，可查看服务端日志</td></tr>
</tbody>
</table>
</div>
</div>

<div id="main"></div>

<div class="st"><div class="ft">真鸿蒙后端 v2.0</div>
</div>
<script>
var tk = (new URLSearchParams(location.search).get('token')||localStorage.getItem('harmony_token'));
if(!tk)location.href='/admin/login';

var apis = [
['🔐 认证接口',[
['POST','/api/auth/send-code','发送验证码','{email}','{code:200,message:"验证码已发送"}'],
['POST','/api/auth/register-email','邮箱注册','{email,code,username,password,nickname?}','返回token和用户信息'],
['POST','/api/auth/login','用户登录','{username,password}','返回token和用户信息'],
['GET','/api/auth/profile','用户信息(需Bearer)','Header: Bearer <token>','返回用户信息']
]],
['👤 用户接口',[
['POST','/api/user/avatar','上传头像(需登录)','Header:Bearer token | body:{avatar:base64图}',JSON.stringify({成功:{code:200,message:'头像已更新'}},null,2)],
['GET','/api/user/avatar/:username','获取头像(公开)','无需认证','直接返回图片'],
['PUT','/api/user/nickname','修改昵称(需登录)','Header:Bearer token | body:{nickname}',JSON.stringify({请求:{nickname:'新昵称'},成功:{code:200,message:'昵称已更新'}},null,2)],
['PUT','/api/user/password','修改密码(需登录)','Header:Bearer token | body:{oldPassword,newPassword}',JSON.stringify({请求:{oldPassword:'旧密码',newPassword:'新密码'},成功:{code:200,message:'密码已更新'}},null,2)],
['DELETE','/api/user/account','注销账号(需登录)','Header:Bearer token',JSON.stringify({code:200,message:'账号已注销'},null,2)],
['POST','/api/feedback','提交反馈(需登录)','Header:Bearer token | body:{title,content}',JSON.stringify({请求:{title:'建议',content:'内容'},成功:{code:200,message:'反馈已提交'}},null,2)],
['GET','/api/feedback','我的反馈(需登录)','Header:Bearer token',JSON.stringify({code:200,data:[{id:1,title:'建议',content:'内容'}]},null,2)]
]],
['⚙️ 管理接口',[
['POST','/api/admin/login','管理员登录','{username,password}','返回token和角色'],
['GET','/api/admin/me','当前管理员','?token=xxx','返回角色和用户名'],
['GET','/api/admin/users','用户列表','?token=xxx','返回用户数组'],
['PUT','/api/admin/users/:id','修改用户(需super)','?token=xxx | body:{nickname,password?}',JSON.stringify({请求:{nickname:'新昵称'},成功:{code:200,message:'更新成功'}},null,2)],
['DELETE','/api/admin/users/:id','删除用户(需super)','?token=xxx',JSON.stringify({code:200,message:'已删除'},null,2)]
]],
['📄 通用接口',[
['GET','/','根路径','-','跳转到登录页'],
['GET','/api/health','健康检查','-',JSON.stringify({code:200,message:'真鸿蒙后端 is running'},null,2)],
['GET','/api/privacy','隐私政策','?token=harmong_doc_sk_2024','返回隐私政策'],
['GET','/api/agreement','用户协议','?token=harmong_doc_sk_2024','返回用户协议'],
['POST','/api/agreement/confirm','同意协议','?token=harmong_doc_sk_2024 | body:{imei,agreed}',JSON.stringify({请求:{imei:'设备IMEI',agreed:true},成功:{code:200,message:'已记录'}},null,2)],
['GET','/api/agreement/status','协议状态','?token=harmong_doc_sk_2024&imei=xxx',JSON.stringify({code:200,data:{agreed:true}},null,2)]
]],
['🍽️ 食堂评论',[
['GET','/api/canteen/windows','所有窗口','无参数','返回全部窗口[{id,name,canteen_id,floor_id}]'],
['GET','/api/canteen/windows/comments','评论列表','?id=窗口id',JSON.stringify({code:200,data:[{id:'11011718640000000',window_id:1101,content:'很好吃！',image:'',likes:5,dislikes:2,created_at:'2026-06-18 22:15',my_vote:1,user:{id:3,username:'P125304049',nickname:'张扬',avatar:'u3_xxx.png'}}]},null,2)],
['POST','/api/canteen/windows/comments','发表评论','?id=窗口id | Header:Bearer token | body:{content,image?}',JSON.stringify({请求:{content:'很好吃！'},成功:{code:200,message:'评论成功',data:{id:'1101xxx'}}},null,2)],
['DELETE','/api/canteen/comments','删除评论','?id=评论id | Header:Bearer token','只能删自己的'],
['POST','/api/canteen/comments/vote','点赞/踩','?id=评论id | Header:Bearer token | body:{type:1或-1}',JSON.stringify({请求:{type:1},成功:{code:200,message:'投票成功'}},null,2)]
]],
['🎮 MATLAB',[
['POST','/api/MATLAB/feedback','意见反馈(限流2条/分钟)','?token=matlab_fb_sk_0rye3uac | body:{source,version,content,time}',JSON.stringify({请求:{source:'SnakeGame',version:'V1.0',content:'意见...'},成功:{code:200,message:'反馈已发送'}},null,2)]
]]
];

document.getElementById('nv').innerHTML=
  '<a href="/admin?token='+tk+'" class="off">返回后台</a>' +
  '<a href="/api-docs?token='+tk+'" class="on">接口文档</a>';

var h='';
for(var g=0;g<apis.length;g++){
  h+='<div class="st">'+apis[g][0]+'</div>';
  for(var i=0;i<apis[g][1].length;i++){
    var a=apis[g][1][i];
    var mc='mt'+{p:'p',g:'g',u:'u',d:'d'}[a[0].toLowerCase().charAt(0)]||'g';
    h+='<div class="cd"><div class="ch" onclick="t(this)"><span class="mt '+mc+'">'+a[0]+'</span><span class="pt">'+esc(a[1])+'</span><span class="ds">'+esc(a[2])+'</span><span class="ar">▼</span></div><div class="cb"><div class="sec"><div class="lb">请求参数</div><div class="tb">'+esc(a[3])+'</div></div>';
    if(a[4]){
      h+='<div class="sec"><div class="lb">请求/返回示例</div><div class="tb" style="position:relative"><button class="cp" onclick="cp(this)">复制</button><pre>'+esc(a[4])+'</pre></div></div>';
    }
    h+='</div></div>';
  }
}
document.getElementById('main').innerHTML=h;

function t(e){var b=e.nextElementSibling;b.classList.toggle('cbon');e.querySelector('.ar').classList.toggle('aron')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(b){var t=b.parentElement.querySelector('pre').textContent;var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);b.textContent='已复制';setTimeout(function(){b.textContent='复制'},1500)}
</script>
</body>
</html>
